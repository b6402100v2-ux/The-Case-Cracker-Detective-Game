kind = "video"
previewPath = "/lina-case-ending/"
title = "Lina's Case – The Verdict Revealed"
version = "1.0.0"
id = "artifacts/lina-case-ending"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lina-case-ending/" ]
localPort = 21964

[services.development]
run = "pnpm --filter @workspace/lina-case-ending run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lina-case-ending", "run", "build" ]
publicDir = "artifacts/lina-case-ending/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21964"
BASE_PATH = "/lina-case-ending/"
